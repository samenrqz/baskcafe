<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bask Café — Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="page-splash">
<div class="splash">
  <div class="splash__bg"></div>
  <div class="splash__overlay"></div>
  <div class="noise"></div>

  <!-- Corner decorations -->
  <div class="corner-deco corner-deco--tl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 L4 56" stroke="#C8A45A" stroke-width="1"/>
      <path d="M4 4 L56 4" stroke="#C8A45A" stroke-width="1"/>
      <circle cx="4" cy="4" r="3" fill="#C8A45A"/>
    </svg>
  </div>
  <div class="corner-deco corner-deco--br">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 L4 56" stroke="#C8A45A" stroke-width="1"/>
      <path d="M4 4 L56 4" stroke="#C8A45A" stroke-width="1"/>
      <circle cx="4" cy="4" r="3" fill="#C8A45A"/>
    </svg>
  </div>

  <div class="splash__content">
    <p class="splash__label"><i class="fas fa-mug-hot me-2"></i>Bask Café</p>
    <h1 class="splash__title">Coffee</h1>
    <div class="splash__rule"></div>
    <p class="splash__tagline">
      Elevate your daily ritual with the finest brews, meticulously crafted to bring warmth, depth, and a moment of pure pleasure.
    </p>
    <div class="splash__cta">
      <a href="home.html" class="btn-bask btn-bask-gold">
        Enter &nbsp;<i class="fas fa-arrow-right"></i>
      </a>
      <a href="menu.html" class="btn-bask btn-bask-outline-white">
        View Menu
      </a>
    </div>
  </div>

  <div class="splash__scroll">
    <div class="splash__scroll-line"></div>
    <span>Discover</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
