<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bask Café — Welcome</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Dancing+Script:wght@500;600;700&family=Jost:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

  <!-- Your master stylesheet -->
  <link rel="stylesheet" href="style.css"/>

  <style>
    /* ── Page-level layout only — all design tokens come from style.css ── */
    html, body        { height: 100%; overflow: hidden; }
    .page-wrapper     { display: flex; height: 100vh; width: 100vw; }

    /* ── LEFT PANEL ── */
    .panel-left {
      width: 40%;
      flex-shrink: 0;
      height: 100vh;
      background-color: var(--cream-200);
      display: flex;
      flex-direction: column;
      align-items: center;          /* center children horizontally */
      position: relative;
      border-right: 1px solid var(--cream-300);
      overflow: hidden;
    }

    /* ── Logo: top-center, generous padding from edge ── */
    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 2.5rem 2rem 0;
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 100%;
      max-width: 260px;
      height: auto;
      display: block;
      border: none;
      outline: none;
      box-shadow: none;
      animation: floatBounce 3.2s ease-in-out infinite;
    }

    /* ── Content block: fills remaining space, shifted right ── */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
      /* Shift content to the right within the left panel */
      padding: 2rem 3rem 3rem 4.5rem;
    }

    /* ── Tagline — inherits style.css Lora italic ── */
    .splash__tagline {
      font-family: var(--font-body);
      font-size: clamp(.92rem, 1.4vw, 1.05rem);
      font-style: italic;
      color: rgba(44,31,14,.68);
      line-height: 1.85;
      border-left: 2px solid var(--gold-500);
      padding-left: 1rem;
      max-width: 320px;
      margin-bottom: 2.5rem;
    }

    /* ── Buttons — reuse style.css btn-bask classes ── */
    .btn-bask { border-radius: 0; }

    /* ── Corner brackets from style.css corner-deco ── */
    .bracket-tl, .bracket-br {
      position: absolute;
      width: 22px; height: 22px;
      opacity: .2;
    }
    .bracket-tl {
      top: 1.25rem; left: 1.25rem;
      border-top: 1.5px solid var(--brown-700);
      border-left: 1.5px solid var(--brown-700);
    }
    .bracket-br {
      bottom: 1.25rem; right: 1.25rem;
      border-bottom: 1.5px solid var(--brown-700);
      border-right: 1.5px solid var(--brown-700);
    }

    /* ── RIGHT PANEL ── */
    .panel-right {
      flex: 1;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: var(--green-900);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .cafe-photo {
      width: 100%;
      height: calc(100vh - 2.5rem);
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .panel-right__watermark {
      position: absolute;
      bottom: 2rem; right: 1.75rem;
      writing-mode: vertical-rl;
      font-family: var(--font-body);
      font-size: .6rem;
      letter-spacing: .18em;
      font-style: italic;
      color: rgba(255,255,255,.3);
      z-index: 2;
      pointer-events: none;
    }

    /* ── Float bounce — pure CSS ── */
    @keyframes floatBounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-9px); }
    }

    /* ── Stagger reveal (mirrors style.css [data-reveal]) ── */
    .reveal     { opacity: 0; transform: translateY(18px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
    .reveal.in  { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 991.98px) {
      .panel-left   { width: 48%; }
      .content-wrap { padding: 2rem 2.5rem 3rem 3.5rem; }
      .logo-wrap img { max-width: 220px; }
    }

    @media (max-width: 767.98px) {
      html, body    { height: 100%; overflow: hidden; }
      .page-wrapper { flex-direction: column; height: 100vh; }
      .panel-left   { width: 100%; height: 100vh; }
      .logo-wrap    { padding-top: 2rem; }
      .logo-wrap img { max-width: 200px; }
      .content-wrap { padding: 1.5rem 2rem 2rem 2rem; }
      .panel-right  { display: none; }
    }
  </style>
</head>

<body class="page-splash">
<div class="page-wrapper">

  <!-- ══ LEFT PANEL ══ -->
  <div class="panel-left">
    <div class="bracket-tl"></div>
    <div class="bracket-br"></div>

    <!-- Logo: top-center -->
    <div class="logo-wrap reveal" data-delay="80">
      <img
        src="images/BASKCAFELOGO.png"
        alt="Bask Café"
      />
    </div>

    <!-- Content block: shifted right via padding-left -->
    <div class="content-wrap">

      <p class="splash__tagline reveal" data-delay="240">
        Elevate your daily ritual with the finest brews, meticulously crafted
        to bring warmth, depth, and a moment of pure pleasure.
      </p>

      <div class="d-flex flex-wrap gap-3 reveal" data-delay="400">
        <a href="home.html" class="btn-bask btn-bask-green">
          Enter &nbsp;<i class="fas fa-arrow-right fa-xs"></i>
        </a>
        <a href="menu.html" class="btn-bask btn-bask-outline-green">
          <i class="fas fa-book-open fa-xs me-1"></i> View Menu
        </a>
      </div>

    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="panel-right">
    <img
      src="/baskcafe/images/baskartisan.png"
      alt="Bask Artisan Café"
      class="cafe-photo img-thumbnail img-fluid"
      onerror="this.style.display='none';"
    />
    <span class="panel-right__watermark">Bask Café &nbsp;·&nbsp; Fine Coffee</span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
<script>
  document.querySelectorAll('.reveal').forEach(el => {
    setTimeout(() => el.classList.add('in'),
      parseInt(el.dataset.delay || 0) + 80);
  });

  const right = document.querySelector('.panel-right');
  const img   = right && right.querySelector('.cafe-photo');
  if (right && img) {
    right.addEventListener('mousemove', e => {
      const r = right.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width  - 0.5) * 10;
      const y = ((e.clientY - r.top)  / r.height - 0.5) * 10;
      img.style.transform  = `scale(1.03) translate(${x}px,${y}px)`;
      img.style.transition = 'transform .08s linear';
    });
    right.addEventListener('mouseleave', () => {
      img.style.transform  = 'scale(1) translate(0,0)';
      img.style.transition = 'transform .8s ease';
    });
  }
</script>
</body>
</html>
