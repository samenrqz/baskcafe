<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bask Café — Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow: hidden; background: var(--green-900); }

    .splash {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .splash__bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1920&q=80') center/cover;
      animation: slowZoom 24s ease-in-out infinite alternate;
      z-index: 0;
    }
    .splash__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(10,22,16,.88) 0%, rgba(30,60,45,.78) 60%, rgba(10,22,16,.92) 100%);
      z-index: 1;
    }
    .noise {
      position: absolute; inset: 0; z-index: 2; opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 300px; pointer-events: none;
    }
    .splash__content {
      position: relative; z-index: 3;
      padding: clamp(24px, 5vw, 60px) 20px;
    }

    .splash__label {
      font-family: 'Jost', sans-serif;
      font-size: .72rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold-400);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp .8s ease .3s forwards;
    }
    .splash__title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(5rem, 18vw, 12rem);
      color: #fff;
      line-height: .92;
      text-shadow: 0 8px 60px rgba(0,0,0,.5);
      opacity: 0;
      animation: fadeUp 1s ease .5s forwards;
    }
    .splash__rule {
      width: 72px; height: 1px;
      background: var(--gold-500);
      margin: 32px auto;
      opacity: 0;
      animation: fadeIn .8s ease 1s forwards;
    }
    .splash__tagline {
      font-family: 'Lora', serif;
      font-size: clamp(.95rem, 2vw, 1.1rem);
      color: rgba(255,255,255,.7);
      max-width: 440px;
      margin: 0 auto 40px;
      font-style: italic;
      line-height: 1.85;
      opacity: 0;
      animation: fadeUp .8s ease 1.1s forwards;
    }
    .splash__cta {
      opacity: 0;
      animation: fadeUp .8s ease 1.4s forwards;
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    }

    .splash__scroll {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0;
      animation: fadeIn 1s ease 2.2s forwards;
    }
    .splash__scroll span {
      font-family: 'Jost', sans-serif;
      font-size: .6rem; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }
    .splash__scroll-line {
      width: 1px; height: 46px;
      background: linear-gradient(to bottom, rgba(200,164,90,.5), transparent);
      animation: scrollPulse 2.2s ease infinite;
    }

    /* Corner decorations */
    .corner-deco {
      position: absolute;
      z-index: 3;
      opacity: .18;
      pointer-events: none;
    }
    .corner-deco--tl { top: 24px; left: 28px; }
    .corner-deco--br { bottom: 24px; right: 28px; transform: rotate(180deg); }
    .corner-deco svg { width: 60px; height: 60px; }

    @keyframes slowZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.18); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; } to { opacity:1; }
    }
  </style>
</head>
<body>
<div class="splash">
  <div class="splash__bg"></div>
  <div class="splash__overlay"></div>
  <div class="noise"></div>

  <!-- Corner decorations -->
  <div class="corner-deco corner-deco--tl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 L4 56" stroke="#C8A45A" stroke-width="1"/>
      <path d="M4 4 L56 4" stroke="#C8A45A" stroke-width="1"/>
      <circle cx="4" cy="4" r="3" fill="#C8A45A"/>
    </svg>
  </div>
  <div class="corner-deco corner-deco--br">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 L4 56" stroke="#C8A45A" stroke-width="1"/>
      <path d="M4 4 L56 4" stroke="#C8A45A" stroke-width="1"/>
      <circle cx="4" cy="4" r="3" fill="#C8A45A"/>
    </svg>
  </div>

  <div class="splash__content">
    <p class="splash__label"><i class="fas fa-mug-hot me-2"></i>Bask Café</p>
    <h1 class="splash__title">Coffee</h1>
    <div class="splash__rule"></div>
    <p class="splash__tagline">
      Elevate your daily ritual with the finest brews, meticulously crafted to bring warmth, depth, and a moment of pure pleasure.
    </p>
    <div class="splash__cta">
      <a href="index.html" class="btn-bask btn-bask-gold">
        Enter &nbsp;<i class="fas fa-arrow-right"></i>
      </a>
      <a href="menu.html" class="btn-bask btn-bask-outline-white">
        View Menu
      </a>
    </div>
  </div>

  <div class="splash__scroll">
    <div class="splash__scroll-line"></div>
    <span>Discover</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
